# ==========================================
# OpenRAG Engine - Application Core
# ==========================================
spring.application.name=OpenRAG-Engine
server.port=8081

# ==========================================
# 1. Vector Database Configuration (Docker)
# ==========================================
# Maps to the permanent Docker container we set up on port 5433
spring.datasource.url=jdbc:postgresql://localhost:5434/knowledge_base
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings
# 'update' automatically creates your Tenant, Folder, and Document tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==========================================
# 2. Local AI Engine Configuration (Ollama)
# ==========================================
spring.ai.ollama.base-url=http://localhost:11434

# Chat Model Settings (The "Brain")
spring.ai.ollama.chat.options.model=llama3.2:3b
# STRICT RULE: Lock temperature to 0.0 to prevent AI hallucinations/garbage data
spring.ai.ollama.chat.options.temperature=0.0

# Embedding Model Settings (The "Translator")
spring.ai.ollama.embedding.options.model=nomic-embed-text

# Permit manual configuration beans to overwrite starter auto-configurations
spring.main.allow-bean-definition-overriding=true

# ==========================================
# 4. Ingestion / File Upload Settings
# ==========================================
# Allows uploading large PDFs and textbooks safely
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================
# 5. Application Logging
# ==========================================
logging.level.root=INFO
# Set your custom package to DEBUG so you can see exactly what the AI is doing
logging.level.com.maheshz.openrag.engine=DEBUG
logging.level.org.springframework.ai=INFO