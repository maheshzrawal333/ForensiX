<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForensiX - Investigation Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Single Source of Truth for Custom Overrides */
        .tree-line { border-left: 1px solid #475569; margin-left: 0.6rem; padding-left: 0.5rem; }
        .terminal-scroll::-webkit-scrollbar, .tree-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .terminal-scroll::-webkit-scrollbar-thumb, .tree-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .terminal-scroll::-webkit-scrollbar-track, .tree-container::-webkit-scrollbar-track { background: #0f172a; }
        .msg-active { border: 2px solid #3b82f6 !important; background-color: rgba(30, 41, 59, 0.8) !important; }
        .panel-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="h-screen flex flex-col p-4 bg-slate-900 text-slate-200 relative">

<header class="mb-4 flex flex-wrap justify-between items-center gap-4 shrink-0">
    <div class="flex items-center gap-4">
        <div class="bg-blue-500 px-4 py-2 rounded shadow-lg">
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter">ForensiX</h1>
        </div>

        <div class="flex bg-slate-800 rounded-lg p-1 border border-slate-700 shadow-inner">
            <button type="button" id="toggleCol1" class="px-3 py-1.5 text-sm rounded bg-blue-600 text-white transition-colors" title="Toggle Structure Panel">📂 Structure</button>
            <button type="button" id="toggleCol2" class="px-3 py-1.5 text-sm rounded bg-blue-600 text-white transition-colors mx-1" title="Toggle Synthesis Panel">📝 Synthesis</button>
            <button type="button" id="toggleCol3" class="px-3 py-1.5 text-sm rounded bg-blue-600 text-white transition-colors" title="Toggle Chat Terminal">💬 Terminal</button>
        </div>
    </div>

    <div class="flex items-center gap-3">
        <select id="caseId" class="bg-slate-200 text-slate-900 font-bold px-4 py-2 rounded focus:outline-none w-64 shadow cursor-pointer">
            <option value="CASE-001">Loading Cases...</option>
        </select>
        <button type="button" id="newCaseBtn" class="bg-slate-300 hover:bg-slate-400 text-slate-900 px-4 py-2 rounded font-bold shadow transition-colors">+ New Case</button>
    </div>
</header>

<div class="flex-1 flex flex-col lg:flex-row gap-4 min-h-0 overflow-hidden">

    <div id="col-1" class="panel-transition bg-slate-500 rounded-lg flex flex-col overflow-hidden shadow-lg p-3 w-full lg:w-1/4">
        <div class="flex flex-col gap-2 mb-3 border-b border-slate-600 pb-2">
            <span class="font-bold text-slate-900">Structure</span>
            <div class="flex flex-wrap gap-1.5 items-center">
                <button type="button" id="globalUploadBtn" title="Upload to Selected Folder" class="text-[10px] font-bold bg-blue-200 hover:bg-blue-600 hover:text-white text-blue-900 px-2 py-1 rounded shadow transition-colors">⬆️ UP</button>
                <button type="button" id="globalRenameBtn" title="Rename Selected" class="text-[10px] font-bold bg-yellow-200 hover:bg-yellow-500 hover:text-white text-yellow-900 px-2 py-1 rounded shadow transition-colors">REN</button>
                <button type="button" id="globalDeleteBtn" title="Delete Selected" class="text-[10px] font-bold bg-red-200 hover:bg-red-600 hover:text-white text-red-900 px-2 py-1 rounded shadow transition-colors">DEL</button>
                <div class="w-px h-4 bg-slate-400 mx-1"></div>
                <button type="button" id="newFolderBtn" class="text-[10px] font-bold bg-slate-200 hover:bg-white text-slate-900 px-2 py-1 rounded shadow">+ FOLD</button>
                <button type="button" id="refreshBtn" class="text-[10px] font-bold text-slate-200 hover:text-white hover:bg-slate-700 px-2 py-1 rounded transition-colors">↻</button>
            </div>
        </div>
        <div id="fileTreeContainer" class="flex-1 overflow-auto tree-container text-sm bg-slate-800 rounded p-2 text-slate-300"></div>
    </div>

    <div id="col-2" class="panel-transition flex flex-col gap-4 min-h-0 w-full lg:flex-1">
        <div class="bg-slate-500 rounded-lg p-4 flex flex-col shadow-lg overflow-hidden flex-1">
            <h2 class="font-bold text-slate-900 mb-2">Reasoning & Citations</h2>
            <div id="reasonContainer" class="flex-1 bg-slate-800 rounded p-4 overflow-y-auto terminal-scroll text-sm text-slate-300 shadow-inner">
                <p class="text-slate-500 italic text-center mt-4">Select an AI response to view its forensic reasoning.</p>
            </div>
            <div class="mt-3 flex justify-end">
                <button type="button" id="validBtn" disabled class="bg-slate-300 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-green-400 hover:text-slate-900 text-slate-900 font-bold py-2 px-6 rounded shadow transition-colors">Valid</button>
            </div>
        </div>
        <div class="bg-slate-500 rounded-lg p-4 flex flex-col shadow-lg overflow-hidden flex-[1.2]">
            <div class="flex justify-between items-center mb-2">
                <h2 class="font-bold text-slate-900">Overall Report</h2>
                <span id="verifiedCount" class="text-xs font-bold bg-slate-400 text-slate-900 px-2 py-1 rounded-full shadow">0 Verified Facts</span>
            </div>
            <div id="reportContainer" class="flex-1 bg-slate-800 rounded p-4 overflow-y-auto terminal-scroll text-sm text-slate-300 shadow-inner whitespace-pre-wrap">
                <p class="text-slate-500 italic">Click 'Go' to synthesize a complete case narrative based ONLY on validated evidence.</p>
            </div>
            <div class="mt-3 flex justify-end">
                <button type="button" id="generateReportBtn" class="bg-slate-300 hover:bg-blue-400 hover:text-slate-900 text-slate-900 font-bold py-2 px-6 rounded shadow transition-colors">Go (Generate)</button>
            </div>
        </div>
    </div>

    <div id="col-3" class="panel-transition bg-slate-500 rounded-lg p-3 flex flex-col shadow-lg overflow-hidden w-full lg:w-[30%]">
        <div class="text-xs text-slate-300 mb-2 flex items-center gap-2">
            <span class="font-bold text-slate-900">Context:</span>
            <span id="activeContextDisplay" class="font-mono bg-slate-800 px-2 py-1 rounded text-blue-300">/Root</span>
        </div>
        <div id="chatWindow" class="flex-1 bg-slate-800 rounded p-3 mb-3 overflow-y-auto terminal-scroll space-y-4 shadow-inner">
            <div class="text-slate-500 text-sm italic text-center mt-2">Initialize query...</div>
        </div>
        <div class="bg-slate-600 rounded p-3 flex flex-col gap-2">
            <div class="flex gap-2">
                <input type="text" id="questionInput" placeholder="Write..." class="flex-1 bg-slate-200 border-none text-slate-900 px-4 py-2 rounded focus:outline-none font-medium placeholder-slate-500 shadow-inner">
                <button type="button" id="askBtn" class="bg-slate-300 hover:bg-white text-slate-900 font-bold py-2 px-6 rounded shadow transition-colors">Go</button>
            </div>
            <div class="flex justify-end items-center gap-2 mt-1">
                <label class="text-xs text-slate-900 font-bold">Model:</label>
                <select id="modelSelector" class="bg-slate-200 text-slate-900 text-xs font-bold px-2 py-1 rounded shadow cursor-pointer">
                </select>
            </div>
        </div>
    </div>
</div>

<div id="modalOverlay" class="fixed inset-0 bg-slate-900/80 z-50 hidden items-center justify-center backdrop-blur-sm transition-opacity">
    <div id="modalContent" class="bg-slate-800 border border-slate-600 rounded-lg shadow-2xl p-6 w-[400px] transform transition-transform scale-95">
        <h3 id="modalTitle" class="text-xl font-bold text-white mb-2">Title</h3>
        <p id="modalBody" class="text-sm text-slate-300 mb-4 leading-relaxed">Message goes here.</p>
        <input type="text" id="modalInput" class="hidden w-full bg-slate-900 border border-slate-600 rounded px-3 py-2 text-white mb-4 focus:outline-none focus:border-blue-500" placeholder="Type here...">
        <div class="flex justify-end gap-3 mt-2">
            <button type="button" id="modalCancel" class="px-4 py-2 rounded bg-slate-700 hover:bg-slate-600 text-white font-bold transition-colors">Cancel</button>
            <button type="button" id="modalConfirm" class="px-4 py-2 rounded text-white font-bold transition-colors shadow">Confirm</button>
        </div>
    </div>
</div>

<input type="file" id="fileInput" multiple class="hidden">

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
